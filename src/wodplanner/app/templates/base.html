<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}WodPlanner{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="manifest" href="/static/site.webmanifest">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">WodPlanner</a>
        </div>
        <div class="nav-links">
            <a href="/" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
            <a href="/calendar" class="{% if active_page == 'calendar' %}active{% endif %}">Calendar</a>
            <a href="/friends" class="{% if active_page == 'friends' %}active{% endif %}">Friends</a>
            <a href="/1rm" class="{% if active_page == '1rm' %}active{% endif %}">1RM</a>
        </div>
        <div class="nav-user">
            {% if user %}
            <span>{{ user.firstname }}</span>
            <form action="/api/auth/logout" method="post" style="display: inline; margin-left: 1rem;">
                <button type="submit" class="btn btn-sm btn-secondary">Logout</button>
            </form>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>WodPlanner &mdash; <a href="https://github.com/sebastiaankok/wodplanner/issues" target="_blank" rel="noopener">Report an issue</a></p>
    </footer>

    <!-- People Modal -->
    <div id="people-modal" class="modal">
        <div id="people-modal-container"></div>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-modal" class="modal">
        <div id="schedule-modal-container"></div>
    </div>

    <!-- 1RM Modal -->
    <div id="one-rep-max-modal" class="modal">
        <div id="one-rep-max-modal-container"></div>
    </div>

    <script>
        function openPeopleModal() {
            document.getElementById('people-modal').classList.add('active');
        }
        function closePeopleModal() {
            document.getElementById('people-modal').classList.remove('active');
            document.getElementById('people-modal-container').innerHTML = '';
        }
        // Close modal on backdrop click
        document.getElementById('people-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closePeopleModal();
            }
        });

        function openScheduleModal() {
            document.getElementById('schedule-modal').classList.add('active');
        }
        function closeScheduleModal() {
            document.getElementById('schedule-modal').classList.remove('active');
            document.getElementById('schedule-modal-container').innerHTML = '';
        }
        // Close schedule modal on backdrop click
        document.getElementById('schedule-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeScheduleModal();
            }
        });

        function open1rmModal() {
            document.getElementById('one-rep-max-modal').classList.add('active');
        }
        function close1rmModal() {
            document.getElementById('one-rep-max-modal').classList.remove('active');
            document.getElementById('one-rep-max-modal-container').innerHTML = '';
        }
        document.getElementById('one-rep-max-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                close1rmModal();
            }
        });

        // Close modals on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePeopleModal();
                closeScheduleModal();
                close1rmModal();
            }
        });

        // Filters toggle
        var filtersOpen = false;
        function applyFiltersState() {
            var panel = document.getElementById('filters');
            var btn = document.getElementById('filters-toggle-btn');
            if (panel) panel.style.display = filtersOpen ? 'flex' : 'none';
            if (btn) btn.classList.toggle('active', filtersOpen);
        }
        function toggleFilters() {
            filtersOpen = !filtersOpen;
            applyFiltersState();
        }
        document.addEventListener('htmx:afterSettle', applyFiltersState);

        // Calendar picker
        var calendarState = { year: 2026, month: 3 }; // 0-indexed month
        var selectedDate = null;

        function toggleCalendar() {
            var dropdown = document.getElementById('calendar-dropdown');
            var currentDateEl = document.querySelector('.current-date');
            if (currentDateEl && currentDateEl.dataset.date) {
                var parts = currentDateEl.dataset.date.split('-');
                calendarState.year = parseInt(parts[0]);
                calendarState.month = parseInt(parts[1]) - 1;
                selectedDate = currentDateEl.dataset.date;
            }
            dropdown.classList.toggle('active');
            if (dropdown.classList.contains('active')) {
                renderCalendar();
            }
        }

        function renderCalendar() {
            var dropdown = document.getElementById('calendar-dropdown');
            var year = calendarState.year;
            var month = calendarState.month;
            var today = new Date();
            var todayStr = today.toISOString().split('T')[0];

            var monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                              'July', 'August', 'September', 'October', 'November', 'December'];
            var dayNames = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];

            var firstDay = new Date(year, month, 1);
            var lastDay = new Date(year, month + 1, 0);
            var startDay = (firstDay.getDay() + 6) % 7; // Monday = 0
            var daysInMonth = lastDay.getDate();
            var prevMonthDays = new Date(year, month, 0).getDate();

            var html = '<div class="calendar-header">';
            html += '<button onclick="changeMonth(-1)">&larr;</button>';
            html += '<span class="calendar-month-year">' + monthNames[month] + ' ' + year + '</span>';
            html += '<button onclick="changeMonth(1)">&rarr;</button>';
            html += '</div>';

            html += '<div class="calendar-weekdays">';
            for (var i = 0; i < 7; i++) {
                html += '<div class="calendar-weekday">' + dayNames[i] + '</div>';
            }
            html += '</div>';

            html += '<div class="calendar-days">';

            // Previous month days
            for (var i = startDay - 1; i >= 0; i--) {
                var day = prevMonthDays - i;
                var dateStr = formatDate(year, month - 1, day);
                html += '<div class="calendar-day other-month" onclick="selectDate(\'' + dateStr + '\')">' + day + '</div>';
            }

            // Current month days
            for (var d = 1; d <= daysInMonth; d++) {
                var dateStr = formatDate(year, month, d);
                var classes = 'calendar-day';
                if (dateStr === todayStr) classes += ' today';
                if (dateStr === selectedDate) classes += ' selected';
                html += '<div class="' + classes + '" onclick="selectDate(\'' + dateStr + '\')">' + d + '</div>';
            }

            // Next month days
            var totalCells = startDay + daysInMonth;
            var remaining = (7 - (totalCells % 7)) % 7;
            for (var i = 1; i <= remaining; i++) {
                var dateStr = formatDate(year, month + 1, i);
                html += '<div class="calendar-day other-month" onclick="selectDate(\'' + dateStr + '\')">' + i + '</div>';
            }

            html += '</div>';
            dropdown.innerHTML = html;
        }

        function formatDate(year, month, day) {
            if (month < 0) { month = 11; year--; }
            if (month > 11) { month = 0; year++; }
            return year + '-' + String(month + 1).padStart(2, '0') + '-' + String(day).padStart(2, '0');
        }

        function changeMonth(delta) {
            calendarState.month += delta;
            if (calendarState.month < 0) { calendarState.month = 11; calendarState.year--; }
            if (calendarState.month > 11) { calendarState.month = 0; calendarState.year++; }
            renderCalendar();
        }

        function selectDate(dateStr) {
            document.getElementById('calendar-dropdown').classList.remove('active');
            htmx.ajax('GET', '/calendar/' + dateStr, {target: '#calendar-content', swap: 'innerHTML'});
        }

        // Close calendar when clicking outside
        document.addEventListener('click', function(e) {
            var dropdown = document.getElementById('calendar-dropdown');
            var wrapper = e.target.closest('.date-picker-wrapper');
            if (!wrapper && dropdown && dropdown.classList.contains('active')) {
                dropdown.classList.remove('active');
            }
        });
    </script>

    {% if user %}
    <!-- PWA install banner -->
    <div id="pwa-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:2000; background:#1d4ed8; color:white; padding:1rem 1.5rem; box-shadow:0 -4px 16px rgba(0,0,0,0.25); align-items:center; gap:1rem; flex-wrap:wrap;">
        <div id="pwa-android" style="display:none; width:100%; align-items:center; gap:1rem; flex-wrap:wrap;">
            <span style="flex:1; min-width:0; font-size:0.9375rem;">Add WodPlanner to your home screen for the best experience.</span>
            <div style="display:flex; gap:0.5rem; flex-shrink:0;">
                <button onclick="pwaBannerInstall()" style="background:white; color:#1d4ed8; border:none; padding:0.375rem 0.875rem; border-radius:0.375rem; font-size:0.875rem; font-weight:500; cursor:pointer;">Install</button>
                <button onclick="pwaBannerDismiss()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:0.375rem 0.875rem; border-radius:0.375rem; font-size:0.875rem; cursor:pointer;">Dismiss</button>
            </div>
        </div>
        <div id="pwa-ios" style="display:none; width:100%; align-items:center; gap:1rem; flex-wrap:wrap;">
            <span style="flex:1; min-width:0; font-size:0.9375rem;">Install: tap the Share button then &ldquo;Add to Home Screen&rdquo;.</span>
            <button onclick="pwaBannerDismiss()" style="background:rgba(255,255,255,0.2); color:white; border:none; padding:0.375rem 0.875rem; border-radius:0.375rem; font-size:0.875rem; cursor:pointer;">Dismiss</button>
        </div>
    </div>
    <script>
        (function() {
            if (window.matchMedia('(display-mode: standalone)').matches) return;
            if (window.navigator.standalone === true) return;
            if (localStorage.getItem('pwa-prompt-dismissed')) return;

            var deferredPrompt = null;

            function showBanner(type) {
                var banner = document.getElementById('pwa-banner');
                var el = document.getElementById('pwa-' + type);
                if (!banner || !el) return;
                banner.style.display = 'flex';
                el.style.display = 'flex';
            }

            window.pwaBannerDismiss = function() {
                localStorage.setItem('pwa-prompt-dismissed', '1');
                document.getElementById('pwa-banner').style.display = 'none';
            };

            window.pwaBannerInstall = function() {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(function(result) {
                    if (result.outcome === 'accepted') {
                        localStorage.setItem('pwa-prompt-dismissed', '1');
                    }
                    deferredPrompt = null;
                    document.getElementById('pwa-banner').style.display = 'none';
                });
            };

            window.addEventListener('beforeinstallprompt', function(e) {
                e.preventDefault();
                deferredPrompt = e;
                showBanner('android');
            });

            var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
            if (isIOS) {
                showBanner('ios');
            }
        })();
    </script>
    {% endif %}
</body>
</html>

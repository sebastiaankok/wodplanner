{% extends "base.html" %}

{% block title %}Calendar - WodPlanner{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Schedule</h1>
    <div id="date-nav" class="date-nav">
        <button hx-get="/calendar/{{ prev_date }}" hx-target="#calendar-content" hx-swap="innerHTML" title="Previous day">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="date-picker-wrapper">
            <span class="current-date" onclick="toggleCalendar()" data-date="{{ current_date }}">{{ display_date }}</span>
            <div id="calendar-dropdown" class="calendar-dropdown"></div>
        </div>
        <button hx-get="/calendar/{{ next_date }}" hx-target="#calendar-content" hx-swap="innerHTML" title="Next day">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"></polyline></svg>
        </button>
        <button hx-get="/calendar/{{ today }}" hx-target="#calendar-content" hx-swap="innerHTML" title="Go to today">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"></circle></svg>
        </button>
        <button class="filters-toggle-btn" id="filters-toggle-btn" onclick="toggleFilters()" title="Toggle filters">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
        </button>
    </div>
</div>

<div id="filters" class="filters">
    <span class="filters-label">Hide:</span>
    {% for filter in filters %}
    <label class="filter-toggle">
        <input type="checkbox"
               {% if filter.hidden %}checked{% endif %}
               hx-post="/filters/toggle/{{ filter.name }}"
               hx-vals='{"current_date": "{{ current_date }}"}'
               hx-target="#calendar-content"
               hx-swap="innerHTML">
        {{ filter.name }}
    </label>
    {% endfor %}
</div>

<div id="calendar-content">
    {% include "partials/calendar_content.html" %}
</div>
{% endblock %}

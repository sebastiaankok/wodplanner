<div class="modal-content">
    <div class="modal-header">
        <h3 class="modal-title">1 Rep Max</h3>
        <button class="modal-close" onclick="close1rmModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
        <form hx-post="/one-rep-maxes/add"
              hx-target="#one-rep-max-history"
              hx-swap="outerHTML"
              class="one-rm-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="1rm-exercise">Exercise</label>
                    <select id="1rm-exercise" name="exercise" required class="form-control">
                        {% for ex in exercises %}
                        <option value="{{ ex }}" {% if suggested_exercises and ex == suggested_exercises[0] %}selected{% endif %}>{{ ex }}</option>
                        {% endfor %}
                    </select>
                    {% if suggested_exercises %}
                    <p class="text-muted" style="font-size:0.8rem; margin-top:0.25rem;">Suggested from today's workout: {{ suggested_exercises | join(', ') }}</p>
                    {% endif %}
                </div>
                <div class="form-group form-group-narrow">
                    <label for="1rm-weight">Weight (kg)</label>
                    <input type="number"
                           id="1rm-weight"
                           name="weight_kg"
                           min="1"
                           max="999"
                           step="0.5"
                           placeholder="100"
                           required
                           class="form-control">
                </div>
                <div class="form-group form-group-narrow">
                    <label for="1rm-date">Date</label>
                    <input type="date"
                           id="1rm-date"
                           name="recorded_at"
                           value="{{ today }}"
                           required
                           class="form-control">
                </div>
                <div class="form-group form-group-submit">
                    <label>&nbsp;</label>
                    <button type="submit" class="btn btn-primary btn-sm">Save</button>
                </div>
            </div>
        </form>

        {% include "partials/one_rep_max_history.html" %}
    </div>
</div>

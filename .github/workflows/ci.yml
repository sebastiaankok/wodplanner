name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,api]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
